# Nginx load balancer for multi-worker VPN Proxy deployment
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# Architecture:
#   Client -> Nginx (SSL termination + LB) -> vpn-proxy workers (plain TCP)
#
# Usage:
#   1. Generate cert: ./scripts/gen_cert.sh /etc/vpn-proxy ecdsa
#   2. Start vpn-proxy workers on ports 8441-8444 (see install_server.sh)
#   3. Place this config and reload nginx

upstream vpn_proxy_backend {
    # least_conn distributes long-lived proxy connections evenly
    least_conn;

    server 127.0.0.1:8441;
    server 127.0.0.1:8442;
    server 127.0.0.1:8443;
    server 127.0.0.1:8444;
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;

    ssl_certificate     /etc/vpn-proxy/server.crt;
    ssl_certificate_key /etc/vpn-proxy/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # TCP proxy mode (no HTTP processing needed)
    proxy_pass vpn_proxy_backend;
    proxy_connect_timeout 5s;
    proxy_timeout 300s;
}