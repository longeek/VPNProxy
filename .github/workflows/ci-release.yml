name: CI and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (used by package script)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: |
          chmod +x scripts/test.sh
          WITH_COVERAGE=never bash scripts/test.sh

  linux-smoke:
    name: Linux Smoke (scripts + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Linux smoke suite
        run: |
          chmod +x scripts/*.sh
          WITH_COVERAGE=never bash scripts/linux_ci_smoke.sh

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - test
      - linux-smoke
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.resolve_version.outputs.version }}
      artifact_name: ${{ steps.resolve_version.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: resolve_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=vpnproxy-${VERSION}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Build package
        run: |
          chmod +x scripts/package.sh
          bash scripts/package.sh "${{ steps.resolve_version.outputs.version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpnproxy-${{ steps.resolve_version.outputs.version }}
          path: |
            dist/${{ steps.resolve_version.outputs.artifact_name }}
            dist/${{ steps.resolve_version.outputs.artifact_name }}.sha256
          if-no-files-found: warn

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vpnproxy-${{ needs.package.outputs.version }}
          path: dist

      - name: Generate release note body
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## VPNProxy ${{ needs.package.outputs.version }}

          Automated release built by GitHub Actions.

          ### Included files
          - \`${{ needs.package.outputs.artifact_name }}\`
          - \`${{ needs.package.outputs.artifact_name }}.sha256\`

          ### Verification
          1. Download package and checksum
          2. Run \`sha256sum -c\` to verify integrity
          3. Follow \`README.md\` and \`MANUAL_TEST_GUIDE.md\` for deployment/validation
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: VPNProxy ${{ needs.package.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/${{ needs.package.outputs.artifact_name }}
            dist/${{ needs.package.outputs.artifact_name }}.sha256
